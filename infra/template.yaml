AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'FinTrack AI — Fraud Detection PoC — Ingestion + Processing Layer'

Globals:
  Function:
    Timeout: 30
    MemorySize: 512

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]

Resources:

  # ── 1. DEAD LETTER QUEUE ─────────────────────────────────────────────────
  TransactionsDLQ:
    Type: AWS::SQS::Queue
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      QueueName: !Sub 'fintrack-transactions-dlq-${Environment}'
      MessageRetentionPeriod: 1209600  # 14 days
      Tags:
        - Key: Project
          Value: fintrack-ai
        - Key: Environment
          Value: !Ref Environment

  # ── 2. MAIN SQS QUEUE ────────────────────────────────────────────────────
  TransactionsQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      QueueName: !Sub 'fintrack-transactions-queue-${Environment}'
      VisibilityTimeout: 60        # Must be >= Lambda timeout (set in S02E)
      MessageRetentionPeriod: 86400  # 1 day
      ReceiveMessageWaitTimeSeconds: 20  # Long polling — reduces cost
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TransactionsDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Project
          Value: fintrack-ai

  # ── 3. IAM ROLE: API Gateway → SQS ───────────────────────────────────────
  ApiGatewayToSQSRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'fintrack-apigw-sqs-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: AllowSQSSendMessage
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'sqs:SendMessage'
                Resource: !GetAtt TransactionsQueue.Arn

  # ── 4. API GATEWAY HTTP API ───────────────────────────────────────────────
  FinTrackHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub 'fintrack-api-${Environment}'
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - 'http://localhost:3000'
          - 'http://localhost:5173'
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - X-Api-Key
        MaxAge: 300

  FinTrackApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref FinTrackHttpApi
      StageName: !Ref Environment
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50

  # ── 5. API GATEWAY → SQS INTEGRATION ─────────────────────────────────────
  SQSIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref FinTrackHttpApi
      IntegrationType: AWS_PROXY
      IntegrationSubtype: SQS-SendMessage
      CredentialsArn: !GetAtt ApiGatewayToSQSRole.Arn
      RequestParameters:
        QueueUrl: !Ref TransactionsQueue
        MessageBody: '$request.body'
      PayloadFormatVersion: '1.0'

  IngestRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref FinTrackHttpApi
      RouteKey: 'POST /ingest'
      Target: !Sub 'integrations/${SQSIntegration}'

  # ── DYNAMODB: transactions ────────────────────────────────────────────────
  TransactionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: transactions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: transaction_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: transaction_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: status-timestamp-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Project
          Value: fintrack-ai

  # ── DYNAMODB: gemini_rate_limiter ─────────────────────────────────────────
  GeminiRateLimiterTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: gemini_rate_limiter
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: date
          AttributeType: S
      KeySchema:
        - AttributeName: date
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── SSM PARAMETERS: daily limits ─────────────────────────────────────────
  GeminiFlashDailyLimit:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /fintrack/gemini_flash_daily_limit
      Type: String
      Value: '500'
      Description: 'Max Gemini Flash API calls per day'

  GeminiProDailyLimit:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /fintrack/gemini_pro_daily_limit
      Type: String
      Value: '100'
      Description: 'Max Gemini Pro API calls per day'

  # (MLDependenciesLayer removed — using container image instead)

  # ── LAMBDA IAM ROLE ───────────────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'fintrack-lambda-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SQSReadPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'sqs:ReceiveMessage'
                  - 'sqs:DeleteMessage'
                  - 'sqs:GetQueueAttributes'
                Resource: !GetAtt TransactionsQueue.Arn
        - PolicyName: DynamoDBWritePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'dynamodb:PutItem'
                  - 'dynamodb:UpdateItem'
                  - 'dynamodb:GetItem'
                Resource:
                  - !GetAtt TransactionsTable.Arn
                  - !Sub '${TransactionsTable.Arn}/index/*'
        - PolicyName: RateLimiterPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'dynamodb:UpdateItem'
                  - 'dynamodb:GetItem'
                Resource: !GetAtt GeminiRateLimiterTable.Arn
        - PolicyName: SSMReadPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ssm:GetParameter'
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/fintrack/*'

  # ── CLOUDWATCH LOG GROUP ──────────────────────────────────────────────────
  TransactionProcessorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/fintrack-transaction-processor
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: fintrack-ai
        - Key: Environment
          Value: !Ref Environment

  # ── CLOUDWATCH METRIC FILTER: GenAI Errors ─────────────────────────────
  GenAIErrorMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref TransactionProcessorLogGroup
      FilterPattern: '{ $.genai_status = "error" }'
      MetricTransformations:
        - MetricNamespace: FinTrack/GenAI
          MetricName: GenAIErrors
          MetricValue: '1'
          DefaultValue: 0

  # ── LAMBDA FUNCTION ───────────────────────────────────────────────────────
  TransactionProcessorFunction:
    Type: AWS::Serverless::Function
    Metadata:
      # Paths are resolved relative to this template file (infra/template.yaml),
      # so DockerContext must go one level up to reach backend/lambda_handler.
      Dockerfile: Dockerfile
      DockerContext: ../backend/lambda_handler
    Properties:
      FunctionName: fintrack-transaction-processor
      PackageType: Image
      ImageUri: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/fintrack-lambda:latest"
      Description: 'Score transactions, persist to DynamoDB, invoke GenAI service'
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref TransactionsTable
          RATE_LIMITER_TABLE: !Ref GeminiRateLimiterTable
          GENAI_SERVICE_URL: 'https://fintrack-genai.railway.app'
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt TransactionsQueue.Arn
            BatchSize: 1
            FunctionResponseTypes: [ReportBatchItemFailures]
        Api:
          Type: Api
          Properties:
            Path: /lambda
            Method: post

Outputs:
  IngestEndpoint:
    Description: 'POST endpoint for transaction ingestion'
    Value: !Sub 'https://${FinTrackHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/ingest'
    Export:
      Name: !Sub 'FinTrackIngestEndpoint-${Environment}'

  SQSQueueUrl:
    Description: 'Main SQS queue URL'
    Value: !Ref TransactionsQueue
    Export:
      Name: !Sub 'FinTrackSQSQueueUrl-${Environment}'

  SQSQueueArn:
    Description: 'Main SQS queue ARN'
    Value: !GetAtt TransactionsQueue.Arn
    Export:
      Name: !Sub 'FinTrackSQSQueueArn-${Environment}'

  DLQUrl:
    Description: 'Dead Letter Queue URL'
    Value: !Ref TransactionsDLQ
    Export:
      Name: !Sub 'FinTrackDLQUrl-${Environment}'

  HttpApiId:
    Description: 'API Gateway HTTP API ID'
    Value: !Ref FinTrackHttpApi
    Export:
      Name: !Sub 'FinTrackHttpApiId-${Environment}'

  DynamoDBTableName:
    Description: 'DynamoDB transactions table name'
    Value: !Ref TransactionsTable
    Export:
      Name: !Sub 'FinTrackDynamoDBTable-${Environment}'

  RateLimiterTableName:
    Description: 'DynamoDB rate limiter table name'
    Value: !Ref GeminiRateLimiterTable
    Export:
      Name: !Sub 'FinTrackRateLimiterTable-${Environment}'

  LambdaFunctionArn:
    Description: 'Lambda function ARN'
    Value: !GetAtt TransactionProcessorFunction.Arn
    Export:
      Name: !Sub 'FinTrackLambdaArn-${Environment}'
